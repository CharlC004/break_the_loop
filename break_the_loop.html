// ── STATE ─────────────────────────────────────────────────────────────────────
let state = { startDate: null, completedDays: {} };
let selDay = null;

function save() { set(DR, state); }

onValue(DR, snap => {
  const d = snap.val();
  if (d && d.startDate) { state = d; showTracker(); }
  else showStart();
});

// ── HELPERS ───────────────────────────────────────────────────────────────────
function quote(day) { return Q[(day - 1) % Q.length]; }

function curDay() {
  if (!state.startDate) return 1;
  const s = new Date(state.startDate), n = new Date();
  s.setHours(0,0,0,0); n.setHours(0,0,0,0);
  return Math.max(1, Math.floor((n - s) / 86400000) + 1);
}

function streak() {
  const c = curDay(); let k = 0;
  for (let d = c; d >= 1; d--) {
    if (state.completedDays[d]) k++;
    else if (d < c) break;
  }
  return k;
}

function quoteHTML(day) {
  const q = quote(day);
  return `<div class="q-text">"${q.t}"</div>
          <div class="q-source">${q.s}</div>
          ${q.r ? `<div class="q-ref">${q.r}</div>` : ''}`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
window.startChallenge = () => {
  state = { startDate: new Date().toISOString().split('T')[0], completedDays: {} };
  save(); showTracker();
};
window.resetChallenge = () => {
  if (!confirm('Reset everything?')) return;
  state = { startDate: null, completedDays: {} };
  save(); showStart();
};
window.toggleDay = d => { state.completedDays[d] = !state.completedDays[d]; save(); render(); };
window.selDay = d => { selDay = (selDay === d) ? null : d; render(); };

// ── RENDER ────────────────────────────────────────────────────────────────────
function showStart() {
  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('tracker').classList.add('hidden');
  document.getElementById('start-quote').innerHTML = quoteHTML(1);
}

function showTracker() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('tracker').classList.remove('hidden');
  render();
}

function render() {
  const cd = curDay();
  const vd = selDay || cd;
  const done = Object.values(state.completedDays).filter(Boolean).length;
  const sk = streak();

  document.getElementById('day-label').textContent = `Day ${cd}  ·  ${done} days clean`;
  document.getElementById('tracker-quote').innerHTML = quoteHTML(cd);

  // Milestone
  const msEl = document.getElementById('milestone-area');
  const ms = MILESTONES.find(m => m.day === cd);
  if (ms) {
    msEl.innerHTML = `<div class="milestone-banner" style="border-color:${ms.color};color:${ms.color};background:${ms.color}11;">◆ ${ms.label} — ${ms.desc}</div>`;
  } else {
    const nx = MILESTONES.find(m => m.day > cd);
    msEl.innerHTML = nx ? `<div class="next-ms">Next milestone: ${nx.label} in ${nx.day - cd} day${nx.day - cd !== 1 ? 's' : ''}</div>` : '';
  }

  // Stats
  document.getElementById('s-streak').textContent = sk;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-hours').textContent = Math.round(done * 2.5);

  // Calendar
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';
  for (let i = 1; i <= cd; i++) {
    const isDone = !!state.completedDays[i];
    const el = document.createElement('div');
    el.className = 'day-cell'
      + (isDone ? ' done' : '')
      + (i === cd ? ' current' : '')
      + (i === selDay ? ' selected' : '')
      + (MS_SET.has(i) ? ' is-ms' : '');
    el.innerHTML = `<span class="day-num">${i}</span>${isDone ? '<span class="day-check">✓</span>' : ''}${MS_SET.has(i) ? '<div class="ms-pip"></div>' : ''}`;
    el.onclick = () => { window.toggleDay(i); window.selDay(i); };
    cal.appendChild(el);
  }
  setTimeout(() => { cal.scrollTop = cal.scrollHeight; }, 50);

  // Suggestions
  document.getElementById('sug-title').textContent = selDay ? `Day ${vd} — Instead of LoL:` : 'Tonight — Instead of LoL:';
  const offset = (vd - 1) % ACTS.length;
  document.getElementById('sug-grid').innerHTML = [0,1,2,3].map(i => {
    const a = ACTS[(offset + i) % ACTS.length];
    return `<div class="sug-card"><div class="sug-icon">${a.icon}</div><div class="sug-name">${a.name}</div><div class="sug-desc">${a.desc}</div><div class="sug-energy">${a.energy} energy</div></div>`;
  }).join('');

  // Reminder
  document.getElementById('reminder-text').textContent = REMINDERS[(cd - 1) % REMINDERS.length];
}
</script>
</body>
</html>
