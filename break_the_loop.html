<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Break the Loop — Evening Protocol</title>
<style>
  :root {
    --bg: #0a0e1a;
    --card: #131826;
    --card-hover: #1a2033;
    --gold: #c9a961;
    --gold-dim: #8a7340;
    --cream: #e8e3d3;
    --text: #d4d4d4;
    --text-dim: #8a8a8a;
    --success: #5a8a5a;
    --partial: #b89048;
    --miss: #6a3a3a;
    --border: #2a3142;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
    line-height: 1.5;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
    padding-top: 16px;
  }

  h1 {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 2px;
    color: var(--cream);
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .gold-bar {
    height: 3px;
    background: var(--gold);
    margin: -24px -24px 20px -24px;
    border-radius: 8px 8px 0 0;
  }

  .section-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    font-weight: 600;
  }

  .streak-display {
    text-align: center;
    padding: 24px 0;
  }

  .streak-number {
    font-size: 72px;
    font-weight: 200;
    color: var(--cream);
    line-height: 1;
  }

  .streak-label {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 8px;
  }

  .quote-card {
    background: linear-gradient(135deg, var(--card) 0%, #1a1f30 100%);
    border-left: 3px solid var(--gold);
  }

  .quote-text {
    font-style: italic;
    color: var(--cream);
    font-size: 15px;
    margin-bottom: 12px;
    line-height: 1.6;
  }

  .quote-author {
    color: var(--gold);
    font-size: 12px;
    letter-spacing: 1px;
    text-align: right;
  }

  .checkin {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 16px;
  }

  .check-button {
    background: var(--card-hover);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 20px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    font-family: inherit;
    font-size: 14px;
  }

  .check-button:hover {
    border-color: var(--gold-dim);
  }

  .check-button.completed {
    background: rgba(90, 138, 90, 0.15);
    border-color: var(--success);
  }

  .check-button.completed::before {
    content: "✓ ";
    color: var(--success);
    font-weight: bold;
  }

  .check-time {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-top: 12px;
  }

  .cal-header {
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    padding: 4px 0;
    letter-spacing: 1px;
  }

  .cal-day {
    aspect-ratio: 1;
    background: var(--card-hover);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--text-dim);
    position: relative;
  }

  .cal-day.empty {
    background: transparent;
  }

  .cal-day.today {
    border: 1px solid var(--gold);
  }

  .cal-day.clean {
    background: var(--success);
    color: var(--cream);
  }

  .cal-day.partial {
    background: var(--partial);
    color: var(--cream);
  }

  .cal-day.miss {
    background: var(--miss);
    color: var(--cream);
  }

  .month-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .month-nav button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
  }

  .month-label {
    color: var(--cream);
    font-size: 14px;
    letter-spacing: 1px;
  }

  .activities {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 12px;
  }

  .activity {
    background: var(--card-hover);
    padding: 12px 16px;
    border-radius: 4px;
    color: var(--text);
    font-size: 14px;
    border-left: 2px solid var(--gold-dim);
  }

  .legend {
    display: flex;
    gap: 16px;
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-dim);
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 12px;
  }

  .stat {
    text-align: center;
    padding: 12px;
    background: var(--card-hover);
    border-radius: 4px;
  }

  .stat-num {
    font-size: 24px;
    color: var(--cream);
    font-weight: 300;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .targets {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 12px;
    text-align: center;
  }

  .target-time {
    color: var(--gold);
    font-weight: 600;
  }

  @media (max-width: 480px) {
    .streak-number { font-size: 56px; }
    .checkin { grid-template-columns: 1fr; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <h1>BREAK THE LOOP</h1>
    <div class="subtitle">Evening Protocol</div>
  </header>

  <div class="card quote-card">
    <div class="gold-bar"></div>
    <div class="section-title">Daily Reflection</div>
    <div class="quote-text" id="quote-text">Loading...</div>
    <div class="quote-author" id="quote-author"></div>
  </div>

  <div class="card">
    <div class="gold-bar"></div>
    <div class="streak-display">
      <div class="streak-number" id="streak-number">0</div>
      <div class="streak-label">Clean Day Streak</div>
    </div>
    <div class="stats-grid">
      <div class="stat">
        <div class="stat-num" id="stat-clean">0</div>
        <div class="stat-label">Clean (30d)</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-partial">0</div>
        <div class="stat-label">Partial (30d)</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-rate">0%</div>
        <div class="stat-label">Clean Rate</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="gold-bar"></div>
    <div class="section-title">Today's Check-In</div>
    <div class="targets">Targets: <span class="target-time">Screens off 9:00 PM</span> · <span class="target-time">Lights out 10:00 PM</span></div>
    <div class="checkin">
      <button class="check-button" id="btn-screens" onclick="toggleCheck('screens')">
        Screens off by 9:00 PM
        <span class="check-time">PHONE · TV · COMPUTER</span>
      </button>
      <button class="check-button" id="btn-lights" onclick="toggleCheck('lights')">
        Lights out by 10:00 PM
        <span class="check-time">IN BED · ASLEEP</span>
      </button>
    </div>
  </div>

  <div class="card">
    <div class="gold-bar"></div>
    <div class="section-title">Replacement Activities</div>
    <div class="activities" id="activities"></div>
  </div>

  <div class="card">
    <div class="gold-bar"></div>
    <div class="section-title">Calendar</div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">← Prev</button>
      <div class="month-label" id="month-label"></div>
      <button onclick="changeMonth(1)">Next →</button>
    </div>
    <div class="calendar" id="calendar"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--success)"></div>Both hit</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--partial)"></div>One hit</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--miss)"></div>Missed</div>
    </div>
  </div>

</div>

<script>
  // ============================================================
  // QUOTE POOL — Gnostic / Stoic / Time discipline
  // ============================================================
  const QUOTES = [
    { text: "It is not that we have a short time to live, but that we waste a lot of it.", author: "Seneca, De Brevitate Vitae" },
    { text: "You could be good today. But instead you choose tomorrow.", author: "Marcus Aurelius, Meditations" },
    { text: "If you bring forth what is within you, what you bring forth will save you. If you do not bring forth what is within you, what you do not bring forth will destroy you.", author: "Gospel of Thomas, Logion 70" },
    { text: "Confine yourself to the present.", author: "Marcus Aurelius, Meditations" },
    { text: "How long are you going to wait before you demand the best of yourself?", author: "Epictetus" },
    { text: "Let us prepare our minds as if we'd come to the very end of life. Let us postpone nothing. Let us balance life's books each day.", author: "Seneca, Letters" },
    { text: "The soul becomes dyed with the colour of its thoughts.", author: "Marcus Aurelius, Meditations" },
    { text: "Wherever there is a human being, there is an opportunity for a kindness — and for self-mastery.", author: "Seneca" },
    { text: "Whoever has come to know the world has discovered a corpse, and whoever has discovered a corpse, of that one the world is not worthy.", author: "Gospel of Thomas, Logion 56" },
    { text: "First say to yourself what you would be; and then do what you have to do.", author: "Epictetus" },
    { text: "The archons mistake their borrowed light for their own. Do not trade your hours for their illusion.", author: "Gnostic reflection" },
    { text: "Waste no more time arguing what a good man should be. Be one.", author: "Marcus Aurelius, Meditations" },
    { text: "He who is not satisfied with a little, is satisfied with nothing.", author: "Epicurus" },
    { text: "The kingdom is inside you, and outside you. When you come to know yourselves, then you will be known.", author: "Gospel of Thomas, Logion 3" },
    { text: "We suffer more often in imagination than in reality.", author: "Seneca" },
    { text: "No man is free who is not master of himself.", author: "Epictetus" },
    { text: "The best revenge is not to be like your enemy.", author: "Marcus Aurelius, Meditations" },
    { text: "Begin at once to live, and count each separate day as a separate life.", author: "Seneca, Letters" },
    { text: "The flesh came into being because of spirit. But spirit came into being because of the body. That is a wonder of wonders.", author: "Gospel of Thomas, Logion 29" },
    { text: "Sleep is the brother of death. The hours before it are when the soul accounts for the day.", author: "Stoic reflection" },
    { text: "Receive the present hour with thankfulness; the future hides things, both good and bad.", author: "Horace, Odes" },
    { text: "Let no one delay the study of philosophy when young, nor weary of it when old.", author: "Epicurus" },
    { text: "The flame consumes only what is offered to it. Choose what you offer.", author: "Heraclitean reflection" },
    { text: "Recognize what is before your eyes, and what is hidden will be revealed to you. For there is nothing hidden which will not be made manifest.", author: "Gospel of Thomas, Logion 5" },
    { text: "He who lives in harmony with himself lives in harmony with the universe.", author: "Marcus Aurelius, Meditations" },
    { text: "It is the power of the mind to be unconquerable.", author: "Seneca" },
    { text: "Remember: matter is moulded only by the form imposed upon it.", author: "Plotinus, Enneads" },
    { text: "Sleep is a discipline. The screen is the thief of it.", author: "Modern reflection" },
    { text: "The unexamined life is not worth living.", author: "Socrates" },
    { text: "What you do every day matters more than what you do once in a while.", author: "Modern reflection" }
  ];

  // ============================================================
  // ACTIVITY SUGGESTIONS — Reading-focused replacements
  // ============================================================
  const ACTIVITIES = [
    "Read a chapter of Berserk Deluxe",
    "Read a chapter of Vagabond Definitive",
    "Continue One Piece progress",
    "Open the Gospel of Thomas — read 5 logia",
    "Read from Marcus Aurelius' Meditations (one book)",
    "Read Seneca — one letter from Epistulae Morales",
    "Continue the Century per Century Review reading",
    "Acoustic guitar — 20 min on the Norman B18",
    "Work through a Charley Crockett song by ear",
    "Notebook reflection — what mattered today, what didn't",
    "Conversation with girlfriend — phones in another room",
    "Walk outside (weather permitting)",
    "Read Dante or Homer — one canto / one book",
    "Plotinus or Nag Hammadi — slow read, one section",
    "Stretch / mobility work — no screen audio"
  ];

  // ============================================================
  // STATE — localStorage-backed (simple, no Firebase needed for v1)
  // ============================================================
  const STORAGE_KEY = "btl_evening_v1";
  let state = loadState();
  let viewDate = new Date();

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : { days: {} };
    } catch (e) {
      return { days: {} };
    }
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function todayKey() {
    const d = new Date();
    return d.toISOString().slice(0, 10);
  }

  function dayKey(date) {
    return date.toISOString().slice(0, 10);
  }

  // ============================================================
  // QUOTE — deterministic daily rotation
  // ============================================================
  function showQuote() {
    const today = new Date();
    const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
    const idx = dayOfYear % QUOTES.length;
    const q = QUOTES[idx];
    document.getElementById("quote-text").textContent = `"${q.text}"`;
    document.getElementById("quote-author").textContent = `— ${q.author}`;
  }

  // ============================================================
  // ACTIVITIES — rotate 3 per day deterministically
  // ============================================================
  function showActivities() {
    const today = new Date();
    const seed = today.getFullYear() * 1000 + Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
    const indices = [];
    let s = seed;
    while (indices.length < 3) {
      s = (s * 1103515245 + 12345) & 0x7fffffff;
      const idx = s % ACTIVITIES.length;
      if (!indices.includes(idx)) indices.push(idx);
    }
    const container = document.getElementById("activities");
    container.innerHTML = "";
    indices.forEach(i => {
      const div = document.createElement("div");
      div.className = "activity";
      div.textContent = ACTIVITIES[i];
      container.appendChild(div);
    });
  }

  // ============================================================
  // CHECK-IN LOGIC
  // ============================================================
  function toggleCheck(type) {
    const key = todayKey();
    if (!state.days[key]) state.days[key] = { screens: false, lights: false };
    state.days[key][type] = !state.days[key][type];
    saveState();
    render();
  }

  function dayStatus(key) {
    const d = state.days[key];
    if (!d) return "none";
    if (d.screens && d.lights) return "clean";
    if (d.screens || d.lights) return "partial";
    return "miss";
  }

  // ============================================================
  // STREAK — counts consecutive clean days ending today/yesterday
  // ============================================================
  function calculateStreak() {
    let streak = 0;
    const today = new Date();
    let cursor = new Date(today);

    // Allow today to not yet be marked — start from yesterday if today is "none"
    const todayK = dayKey(cursor);
    if (dayStatus(todayK) === "none") {
      cursor.setDate(cursor.getDate() - 1);
    } else if (dayStatus(todayK) !== "clean") {
      return 0;
    }

    while (true) {
      const k = dayKey(cursor);
      if (dayStatus(k) === "clean") {
        streak++;
        cursor.setDate(cursor.getDate() - 1);
      } else {
        break;
      }
    }
    return streak;
  }

  function calculate30DayStats() {
    let clean = 0, partial = 0, total = 0;
    const today = new Date();
    for (let i = 0; i < 30; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const status = dayStatus(dayKey(d));
      if (status !== "none") {
        total++;
        if (status === "clean") clean++;
        else if (status === "partial") partial++;
      }
    }
    const rate = total > 0 ? Math.round((clean / total) * 100) : 0;
    return { clean, partial, rate };
  }

  // ============================================================
  // CALENDAR
  // ============================================================
  function renderCalendar() {
    const year = viewDate.getFullYear();
    const month = viewDate.getMonth();
    const monthName = viewDate.toLocaleString("en-US", { month: "long", year: "numeric" });
    document.getElementById("month-label").textContent = monthName.toUpperCase();

    const first = new Date(year, month, 1);
    const last = new Date(year, month + 1, 0);
    const startDay = first.getDay();
    const daysInMonth = last.getDate();

    const cal = document.getElementById("calendar");
    cal.innerHTML = "";

    ["S", "M", "T", "W", "T", "F", "S"].forEach(d => {
      const h = document.createElement("div");
      h.className = "cal-header";
      h.textContent = d;
      cal.appendChild(h);
    });

    for (let i = 0; i < startDay; i++) {
      const empty = document.createElement("div");
      empty.className = "cal-day empty";
      cal.appendChild(empty);
    }

    const todayK = todayKey();
    for (let day = 1; day <= daysInMonth; day++) {
      const d = new Date(year, month, day);
      const k = dayKey(d);
      const status = dayStatus(k);
      const cell = document.createElement("div");
      cell.className = "cal-day";
      if (status === "clean") cell.classList.add("clean");
      else if (status === "partial") cell.classList.add("partial");
      else if (status === "miss") cell.classList.add("miss");
      if (k === todayK) cell.classList.add("today");
      cell.textContent = day;
      cal.appendChild(cell);
    }
  }

  function changeMonth(delta) {
    viewDate.setMonth(viewDate.getMonth() + delta);
    renderCalendar();
  }

  // ============================================================
  // RENDER
  // ============================================================
  function render() {
    const key = todayKey();
    const d = state.days[key] || { screens: false, lights: false };
    document.getElementById("btn-screens").classList.toggle("completed", d.screens);
    document.getElementById("btn-lights").classList.toggle("completed", d.lights);

    document.getElementById("streak-number").textContent = calculateStreak();

    const stats = calculate30DayStats();
    document.getElementById("stat-clean").textContent = stats.clean;
    document.getElementById("stat-partial").textContent = stats.partial;
    document.getElementById("stat-rate").textContent = stats.rate + "%";

    renderCalendar();
  }

  // INIT
  showQuote();
  showActivities();
  render();
</script>

</body>
</html>
